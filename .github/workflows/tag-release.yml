name: Tag Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to tag, without the leading v
        required: true
        type: string

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify version
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: version must look like X.Y.Z"
            exit 1
          fi

          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "error: manifest.json version ($MANIFEST_VERSION) does not match requested version ($VERSION)"
            exit 1
          fi

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "error: tag v$VERSION already exists"
            exit 1
          fi

      - name: Create and push tag
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
