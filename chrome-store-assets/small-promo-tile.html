<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=440, initial-scale=1">
  <title>Chap Shuffle Small Promo Tile</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 440px;
      height: 280px;
      margin: 0;
      overflow: hidden;
      background: #0a0a0a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .tile {
      position: relative;
      width: 440px;
      height: 280px;
      overflow: hidden;
      color: #ffffff;
      background:
        radial-gradient(circle at 89% 82%, rgba(255, 0, 0, 0.25), transparent 42%),
        radial-gradient(circle at 15% 26%, rgba(255, 0, 0, 0.16), transparent 34%),
        linear-gradient(135deg, #080808 0%, #101010 54%, #1a0606 100%);
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.13;
      background-image:
        linear-gradient(rgba(255, 0, 0, 0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 0, 0.18) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .youtube-shell {
      position: absolute;
      inset: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      opacity: 0.48;
    }

    .search {
      position: absolute;
      top: 16px;
      left: 88px;
      width: 200px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .dots {
      position: absolute;
      top: 17px;
      right: 22px;
      display: flex;
      gap: 10px;
    }

    .dots span {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .side-rail {
      position: absolute;
      top: 64px;
      left: 18px;
      display: grid;
      gap: 18px;
    }

    .side-rail span {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.06);
    }

    .brand {
      position: absolute;
      top: 26px;
      left: 22px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .play {
      width: 18px;
      height: 13px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.45);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      position: relative;
    }

    .play::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 3px;
      width: 0;
      height: 0;
      border-top: 3.5px solid transparent;
      border-bottom: 3.5px solid transparent;
      border-left: 6px solid #0a0a0a;
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 52px 34px 36px 46px;
    }

    .icon-card {
      width: 112px;
      height: 112px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      border-radius: 20px;
      background: rgba(18, 18, 18, 0.92);
      border: 3px solid rgba(255, 0, 0, 0.48);
      box-shadow:
        0 0 34px rgba(255, 0, 0, 0.3),
        0 20px 44px rgba(0, 0, 0, 0.58);
    }

    .icon-card svg {
      width: 74px;
      height: 74px;
      color: #ff1010;
      filter: drop-shadow(0 0 13px rgba(255, 0, 0, 0.9));
    }

    .copy {
      min-width: 0;
      padding-top: 5px;
    }

    h1 {
      margin: 0;
      font-size: 58px;
      line-height: 0.86;
      letter-spacing: -0.045em;
      font-weight: 900;
      text-wrap: balance;
    }

    .rule {
      width: 184px;
      height: 5px;
      margin: 13px 0 15px;
      border-radius: 999px;
      background: #dc171f;
      box-shadow: 0 0 16px rgba(255, 0, 0, 0.62);
    }

    p {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 17px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    p strong {
      color: #ffffff;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="tile" aria-label="Chap Shuffle small promo tile">
    <div class="youtube-shell"></div>
    <div class="brand"><span class="play"></span><span>YouTube</span></div>
    <div class="search"></div>
    <div class="dots"><span></span><span></span><span></span></div>
    <div class="side-rail"><span></span><span></span><span></span></div>

    <section class="content">
      <div class="icon-card" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round">
          <path d="m18 14 4 4-4 4"></path>
          <path d="m18 2 4 4-4 4"></path>
          <path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"></path>
          <path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"></path>
          <path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"></path>
        </svg>
      </div>

      <div class="copy">
        <h1>Chap<br>Shuffle</h1>
        <div class="rule"></div>
        <p>Auto-advance<br><strong>shuffled chapters</strong></p>
      </div>
    </section>
  </main>
</body>
</html>
