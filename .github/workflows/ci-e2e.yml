name: CI E2E

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Playwright Chromium
        run: yarn playwright install --with-deps chromium

      - name: Run E2E suite
        id: e2e
        continue-on-error: true
        run: just ci-e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-e2e-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Publish summary
        if: always()
        run: |
          if [ "${{ steps.e2e.outcome }}" = "success" ]; then
            echo "### CI E2E passed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This workflow is informational and does not gate merges." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### CI E2E failed (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The live browser suite found a regression or hit external flakiness. Review the uploaded Playwright artifacts for details." >> "$GITHUB_STEP_SUMMARY"
          fi
