<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 260px;
        font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        font-size: 14px;
        background: #0f0f0f;
        color: #fff;
        padding: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .logo {
        font-size: 22px;
        line-height: 1;
      }
      .title {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .label {
        line-height: 1.4;
      }
      .sublabel {
        font-size: 11px;
        opacity: 0.45;
        margin-top: 2px;
      }

      /* pill toggle switch */
      .switch {
        position: relative;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #444;
        border-radius: 22px;
        transition: background 0.18s;
      }
      .slider::before {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        bottom: 3px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.18s;
      }
      input:checked + .slider {
        background: #f00;
      }
      input:checked + .slider::before {
        transform: translateX(18px);
      }

      .hint {
        font-size: 11px;
        opacity: 0.4;
        margin-top: 14px;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="popup.js"></script>
  </body>
</html>
