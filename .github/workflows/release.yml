name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.3)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_REF="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG_REF#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "error: manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_REF)"
            exit 1
          fi

      - name: Build & package
        run: just zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: chapshuffle-*.zip
          generate_release_notes: true
